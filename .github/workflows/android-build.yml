name: Android CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# 使用已迁移到 Node.js 24 的 Actions，避免 Node 20 弃用告警（见 GitHub changelog）
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# main 上勿用「同一 ref」作并发键：合并会触发 CI，随后 bot 推送 [skip ci] 的版本提交会再触发一次，
# 若 cancel-in-progress 为 true，会把**正在跑的合并构建**取消，导致无 Artifacts、Publish Release 不跑。
concurrency:
  group: >-
    android-ci-${{ github.workflow }}-${{
      github.event_name == 'pull_request'
        && format('pr-{0}', github.event.pull_request.number)
        || github.sha
    }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # 避免：bot 推送 [skip ci] 的 version commit 再次触发 workflow 时又 bump 一次（连跳两版）
      - name: Bump app version (main push only, not after [skip ci] commit)
        id: bump
        if: >
          github.event_name != 'pull_request' &&
          github.ref == 'refs/heads/main' &&
          !contains(github.event.head_commit.message, '[skip ci]')
        run: python3 scripts/bump_app_version.py

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: >-
            platform-tools
            platforms;android-35
            build-tools;35.0.0

      - name: Write local.properties
        run: echo "sdk.dir=${ANDROID_SDK_ROOT}" > local.properties

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Assemble Debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Assemble Release APK
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest --no-daemon --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v6
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload Release APK
        uses: actions/upload-artifact@v6
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Commit version bump to main
        if: >
          github.event_name != 'pull_request' &&
          github.ref == 'refs/heads/main' &&
          !contains(github.event.head_commit.message, '[skip ci]')
        env:
          VERSION_NAME: ${{ steps.bump.outputs.version_name }}
          VERSION_CODE: ${{ steps.bump.outputs.version_code }}
        run: |
          set -eux
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add app/build.gradle.kts
          if git diff --staged --quiet; then
            echo "No version changes to commit"
            exit 0
          fi
          git commit -m "chore(release): bump to v${VERSION_NAME} (${VERSION_CODE}) [skip ci]"
          git push origin HEAD:main
