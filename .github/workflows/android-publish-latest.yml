# main 上 Android CI 成功后：为当前版本新建一条 GitHub Release（不覆盖历史）
name: Publish main APK (per version)

on:
  workflow_run:
    workflows: ["Android CI"]
    types: [completed]
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: publish-main-apk-${{ github.event.workflow_run.id }}
  cancel-in-progress: true

jobs:
  publish-version-release:
    runs-on: ubuntu-latest
    # 注意：push 到 main 时 head_branch 有时为空字符串
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      (github.event.workflow_run.event == 'push' ||
       github.event.workflow_run.event == 'workflow_dispatch') &&
      (github.event.workflow_run.head_branch == 'main' ||
       github.event.workflow_run.head_branch == '')
    timeout-minutes: 15
    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout at CI head SHA
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Download Release APK from triggering run
        uses: actions/download-artifact@v8
        with:
          name: app-release-apk
          path: apk
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Create immutable release for this version (or refresh asset on re-run)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -eux
          APP_VER=$(grep -E 'versionName\s*=' app/build.gradle.kts | head -1 | sed -E 's/.*versionName\s*=\s*"([^"]+)".*/\1/')
          APP_CODE=$(grep -E 'versionCode\s*=' app/build.gradle.kts | head -1 | sed -E 's/.*versionCode\s*=\s*([0-9]+).*/\1/')
          test -n "$APP_VER"
          test -n "$APP_CODE"
          TAG="v${APP_VER}"
          RELEASE_TITLE="$TAG"
          SRC=$(ls apk/*.apk | head -1)
          cp "$SRC" weight-agent-release.apk

          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git tag -fa "$TAG" -m "CI build ${RELEASE_TITLE} (versionCode ${APP_CODE})" "$HEAD_SHA"
          git push origin "refs/tags/$TAG" --force

          cat > release-notes.md <<EOF
          **versionName** \`${APP_VER}\` · **versionCode** \`${APP_CODE}\`（\`app/build.gradle.kts\` 于本次构建提交）。

          - 构建提交: [\`$HEAD_SHA\`](https://github.com/${{ github.repository }}/commit/$HEAD_SHA)
          - [Android CI 运行](https://github.com/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }})
          - 附件 \`weight-agent-release.apk\`；未配置正式 keystore 时为 **ci-debug** 签名的 release 变体。

          本条 Release **按版本保留**，不再覆盖旧版。手动 **git tag v\*** 触发的发布见 \`android-release.yml\`（附件名为 \`app-release.apk\`）。
          EOF
          sed -i 's/^[[:space:]]*//' release-notes.md

          REPO="${{ github.repository }}"
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release upload "$TAG" weight-agent-release.apk --clobber --repo "$REPO"
          else
            gh release create "$TAG" weight-agent-release.apk \
              --title "$RELEASE_TITLE" \
              --notes-file release-notes.md \
              --latest \
              --repo "$REPO"
          fi
